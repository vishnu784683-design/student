{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Mother Theresa College</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:linear-gradient(135deg,#0d6efd,#6ea8fe);

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.login-card{

    width:400px;

    background:white;

    padding:40px;

    border-radius:15px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}

.logo{

    width:90px;

    height:90px;

    background:#0d6efd;

    color:white;

    border-radius:50%;

    margin:auto;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:45px;

}

h2{

    text-align:center;

    color:#0d6efd;

    margin-top:20px;

}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

}

.input-box{

    position:relative;

    margin-bottom:20px;

}

input{

    width:100%;

    padding:14px;

    border:1px solid #ccc;

    border-radius:6px;

    outline:none;

    font-size:16px;

}

input:focus{

    border-color:#0d6efd;

}

.eye{

    position:absolute;

    right:15px;

    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    font-size:20px;

}

.login-btn{

    width:100%;

    padding:14px;

    background:#0d6efd;

    color:white;

    border:none;

    border-radius:6px;

    font-size:18px;

    cursor:pointer;

}

.login-btn:hover{

    background:#084298;

}

.alert{

    background:#f8d7da;

    color:#842029;

    padding:12px;

    border-radius:5px;

    margin-top:20px;

    text-align:center;

}

.bottom{

    text-align:center;

    margin-top:25px;

}

.bottom a{

    text-decoration:none;

    color:#0d6efd;

    font-weight:bold;

}

.home-btn{

    display:inline-block;

    margin-top:15px;

    padding:10px 18px;

    border:2px solid #0d6efd;

    border-radius:5px;

    color:#0d6efd;

    text-decoration:none;

}

.home-btn:hover{

    background:#0d6efd;

    color:white;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

🎓

</div>

<h2>Mother Theresa College</h2>

<p class="subtitle">
Student Management System
</p>

<form method="POST">

{% csrf_token %}

<label>Username</label>

<div class="input-box">

<input
type="text"
name="username"
placeholder="Enter Username"
required>

</div>

<label>Password</label>

<div class="input-box">

<input
type="password"
id="password"
name="password"
placeholder="Enter Password"
required>

<span class="eye" onclick="showPassword()">
👁
</span>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

{% if messages %}

{% for message in messages %}

<div class="alert">

{{ message }}

</div>

{% endfor %}

{% endif %}

<div class="bottom">

<p>

Don't have an account?

<a href="{% url 'register' %}">
Register
</a>

</p>

<a href="{% url 'landing' %}" class="home-btn">

🏠 Back Home

</a>

</div>

</form>

</div>

<script>

function showPassword(){

let password=document.getElementById("password");

if(password.type==="password"){

password.type="text";

}else{

password.type="password";

}

}

</script>

</body>

</html>
