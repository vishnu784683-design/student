{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Mother Theresa College</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



<style>


body{

background:linear-gradient(135deg,#0d6efd,#6ea8fe);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px 0;

font-family:Arial, Helvetica, sans-serif;

}



.register-card{

width:450px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}



.logo{

width:90px;

height:90px;

background:#0d6efd;

color:white;

margin:auto;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

}



.form-control{

height:48px;

}



.btn-register{

height:48px;

font-size:18px;

font-weight:bold;

}



.input-group-text{

background:#0d6efd;

color:white;

}



.title{

color:#0d6efd;

font-weight:bold;

}


</style>


</head>



<body>




<div class="register-card">



<div class="logo">

<i class="bi bi-mortarboard-fill"></i>

</div>




<h2 class="text-center mt-3 title">

Mother Theresa College

</h2>



<p class="text-center text-muted">

Student Registration

</p>





<form method="POST">


{% csrf_token %}




<!-- Full Name -->


<div class="mb-3">


<label class="form-label fw-bold">

Full Name

</label>



<div class="input-group">


<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>



<input

type="text"

name="first_name"

class="form-control"

placeholder="Enter Full Name"

required>


</div>


</div>





<!-- Email -->


<div class="mb-3">


<label class="form-label fw-bold">

Email Address

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-envelope-fill"></i>

</span>



<input

type="email"

name="email"

class="form-control"

placeholder="Enter Email"

required>


</div>


</div>







<!-- Username -->


<div class="mb-3">


<label class="form-label fw-bold">

Username

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-person-circle"></i>

</span>



<input

type="text"

name="username"

class="form-control"

placeholder="Choose Username"

required>


</div>


</div>







<!-- Password -->


<div class="mb-3">


<label class="form-label fw-bold">

Password

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>



<input

type="password"

name="password"

class="form-control"

placeholder="Create Password"

required>


</div>


</div>






<!-- Phone Number -->


<div class="mb-3">


<label class="form-label fw-bold">

Phone Number

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-telephone-fill"></i>

</span>



<input

type="text"

name="phone"

class="form-control"

placeholder="Enter Phone Number"

pattern="[0-9]{10}"

required>


</div>


</div>







<!-- Branch -->


<div class="mb-3">


<label class="form-label fw-bold">

Branch

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-building"></i>

</span>



<select

name="branch"

class="form-control"

required>



<option value="">

Select Branch

</option>


<option value="CSE">

Computer Science Engineering (CSE)

</option>


<option value="ECE">

Electronics and Communication Engineering (ECE)

</option>


<option value="CIVIL">

Civil Engineering

</option>


<option value="MECH">

Mechanical Engineering

</option>


</select>


</div>


</div>







<!-- Year -->


<div class="mb-3">


<label class="form-label fw-bold">

Year of Study

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-calendar-check-fill"></i>

</span>



<select

name="year"

class="form-control"

required>


<option value="">

Select Year

</option>


<option value="1st Year">

1st Year

</option>


<option value="2nd Year">

2nd Year

</option>


<option value="3rd Year">

3rd Year

</option>


<option value="4th Year">

4th Year

</option>


</select>


</div>


</div>







<!-- Confirm Password -->


<div class="mb-3">


<label class="form-label fw-bold">

Confirm Password

</label>



<div class="input-group">


<span class="input-group-text">

<i class="bi bi-shield-lock-fill"></i>

</span>



<input

type="password"

name="confirm_password"

class="form-control"

placeholder="Confirm Password"

required>


</div>


</div>







<button

type="submit"

class="btn btn-success w-100 btn-register">


<i class="bi bi-person-plus-fill"></i>

Register


</button>







{% if messages %}


{% for message in messages %}


<div class="alert alert-danger mt-3 text-center">

{{message}}

</div>


{% endfor %}


{% endif %}







<div class="text-center mt-3">


Already have an account?


<a href="{% url 'login' %}" class="fw-bold">

Login Here

</a>


</div>





</form>


</div>





</body>

</html>
