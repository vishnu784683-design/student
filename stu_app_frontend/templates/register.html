{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Mother Theresa College</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:linear-gradient(135deg,#0d6efd,#6ea8fe);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

}

.register-card{

    width:450px;

    background:white;

    padding:35px;

    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}

.logo{

    width:90px;

    height:90px;

    background:#0d6efd;

    color:white;

    margin:auto;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:45px;

}

h2{

    text-align:center;

    color:#0d6efd;

    margin-top:20px;

}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

}

input,
select{

    width:100%;

    padding:13px;

    border:1px solid #ccc;

    border-radius:6px;

    font-size:15px;

    margin-bottom:18px;

    outline:none;

}

input:focus,
select:focus{

    border-color:#0d6efd;

}

button{

    width:100%;

    padding:14px;

    background:#198754;

    color:white;

    border:none;

    border-radius:6px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#157347;

}

.alert{

    margin-top:20px;

    padding:12px;

    background:#f8d7da;

    color:#842029;

    border-radius:5px;

    text-align:center;

}

.bottom{

    text-align:center;

    margin-top:20px;

}

.bottom a{

    text-decoration:none;

    color:#0d6efd;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">

🎓

</div>

<h2>Mother Theresa College</h2>

<p class="subtitle">

Student Registration

</p>

<form method="POST">

{% csrf_token %}

<label>Full Name</label>

<input
type="text"
name="first_name"
placeholder="Enter Full Name"
required>

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<label>Username</label>

<input
type="text"
name="username"
placeholder="Choose Username"
required>

<label>Password</label>

<input
type="password"
name="password"
placeholder="Create Password"
required>

<label>Phone Number</label>

<input
type="text"
name="phone"
placeholder="Enter Phone Number"
pattern="[0-9]{10}"
required>

<label>Branch</label>

<select name="branch" required>

<option value="">Select Branch</option>

<option value="CSE">
Computer Science Engineering (CSE)
</option>

<option value="ECE">
Electronics & Communication Engineering (ECE)
</option>

<option value="CIVIL">
Civil Engineering
</option>

<option value="MECH">
Mechanical Engineering
</option>

</select>

<label>Year of Study</label>

<select name="year" required>

<option value="">Select Year</option>

<option>1st Year</option>

<option>2nd Year</option>

<option>3rd Year</option>

<option>4th Year</option>

</select>

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<button type="submit">

Register

</button>

{% if messages %}

{% for message in messages %}

<div class="alert">

{{ message }}

</div>

{% endfor %}

{% endif %}

<div class="bottom">

Already have an account?

<a href="{% url 'login' %}">

Login Here

</a>

</div>

</form>

</div>

</body>

</html>
